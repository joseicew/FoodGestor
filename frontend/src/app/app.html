<div class="app-container">
  <!-- Indicador de sincronización -->
  @if (authService.estaAutenticado() && (syncStatus$ | async) as status) {
    <div class="sync-indicator" [class.syncing]="status.isSyncing" [class.offline]="status.isOffline" [class.error]="status.lastError" title="{{ getSyncText() }}">
      <span class="sync-icon">{{ getSyncIcon() }}</span>
      <span class="sync-text">{{ getSyncText() }}</span>
      @if (status.pendingChanges > 0) {
        <span class="pending-badge">{{ status.pendingChanges }}</span>
      }
    </div>
  }

  <main class="content">
    <router-outlet />
  </main>
  @if (authService.estaAutenticado()) {
    <nav class="bottom-nav">
      <a routerLink="/perfil" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Perfil</span>
      </a>
      <a routerLink="/alimentos" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">🥗</span>
        <span class="nav-label">Alimentos</span>
      </a>
      <a routerLink="/raciones" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">🍽️</span>
        <span class="nav-label">Raciones</span>
      </a>
      <a routerLink="/calendario" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📅</span>
        <span class="nav-label">Calendario</span>
      </a>
    </nav>
  }
</div>
