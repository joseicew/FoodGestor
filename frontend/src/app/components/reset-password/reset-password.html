<div class="reset-container">
  <div class="reset-box">
    <div class="header">
      <img src="/assets/calendar-icon.svg" alt="FoodGestor" class="app-icon">
      <h1>Nueva contraseña</h1>
      <p class="subtitle">Introduce tu nueva contraseña</p>
    </div>

    <app-mensaje-flash />

    @if (exito) {
      <div class="exito-msg">
        Contraseña actualizada correctamente. Redirigiendo al login...
      </div>
    } @else {
      <form (ngSubmit)="resetear()" class="form">
        <div class="form-group">
          <label for="nuevaPassword">Nueva contraseña</label>
          <input
            type="password"
            id="nuevaPassword"
            [(ngModel)]="nuevaPassword"
            name="nuevaPassword"
            placeholder="Mínimo 6 caracteres"
            [disabled]="cargando"
          />
        </div>

        <div class="form-group">
          <label for="confirmarPassword">Confirmar contraseña</label>
          <input
            type="password"
            id="confirmarPassword"
            [(ngModel)]="confirmarPassword"
            name="confirmarPassword"
            placeholder="Repite la contraseña"
            [disabled]="cargando"
          />
        </div>

        <button type="submit" class="btn-primary" [disabled]="cargando || !nuevaPassword || !confirmarPassword">
          @if (cargando) {
            <span class="spinner"></span>
            Guardando...
          } @else {
            Guardar contraseña
          }
        </button>
      </form>
    }

    <div class="footer">
      <a routerLink="/login">Volver al login</a>
    </div>
  </div>
</div>
