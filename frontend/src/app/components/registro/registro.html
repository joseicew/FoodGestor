<div class="registro-container">
  <div class="registro-box">
    <div class="header">
      <h1>🥗 FoodGestor</h1>
      <p class="subtitle">Crea tu cuenta</p>
    </div>

    <app-mensaje-flash />

    <form (ngSubmit)="registro()" class="form">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          placeholder="tu@email.com"
          [disabled]="cargando"
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          [disabled]="cargando"
        />
        <small class="hint">Mínimo 8 caracteres: mayúscula, minúscula y número</small>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar contraseña</label>
        <input
          type="password"
          id="confirmPassword"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          placeholder="••••••••"
          [disabled]="cargando"
        />
      </div>

      <button type="submit" class="btn-primary" [disabled]="cargando">
        @if (cargando) {
          <span class="spinner"></span>
          Registrando...
        } @else {
          Crear cuenta
        }
      </button>
    </form>

    <div class="footer">
      <p>
        ¿Ya tienes cuenta?
        <a routerLink="/login" [class.disabled]="cargando">Iniciar sesión</a>
      </p>
    </div>
  </div>
</div>
