@if (alimentos.length === 0) {
  <p class="empty-state">{{ textoVacio }}</p>
}

<div class="alimentos-list">
  @for (alimento of alimentos; track alimento.id) {
    <div class="alimento-card clickable"
         [class.con-alergias]="resaltarAlergias && tieneAlergia(alimento)"
         [class.con-no-deseados]="tieneIngNoDeseado(alimento)"
         [class.sin-caracteristicas-negativas]="resaltarAlergias && !tieneAlergia(alimento) && !tieneIngNoDeseado(alimento)"
         (click)="onSeleccionar(alimento)">

      <div class="alimento-top">
        <span class="alimento-nombre">{{ alimento.nombre }}</span>
        @if (alimento.categoria) {
          <span class="categoria-badge">{{ alimento.categoria }}</span>
        }
      </div>

      @if (alimento.marca) {
        <span class="alimento-marca">{{ alimento.marca }}</span>
      }

      <div class="alimento-bottom">
        @if (alimento.codigo_barras) {
          <span class="alimento-barcode">{{ alimento.codigo_barras }}</span>
        } @else {
          <span></span>
        }
        <button class="btn-favorito"
                [class.favorito]="favoritosFijos || alimento.favorito"
                (click)="onToggleFavorito(alimento, $event)"
                title="Favorito">
          {{ (favoritosFijos || alimento.favorito) ? '⭐' : '☆' }}
        </button>
      </div>
    </div>
  }
</div>
