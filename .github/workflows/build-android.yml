name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'URL del backend (ej: http://100.x.x.x:5000)'
        required: true
        default: 'http://TU_IP_TAILSCALE:5000'

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Set API URL
        working-directory: frontend
        run: |
          sed -i "s|http://TU_IP_AQUI:5000|${{ github.event.inputs.api_url }}|g" src/environments/environment.prod.ts

      - name: Build Angular (production)
        working-directory: frontend
        run: npm run build -- --configuration=production

      - name: Install Capacitor Android
        working-directory: frontend
        run: npm install @capacitor/android

      - name: Add Android platform
        working-directory: frontend
        run: npx cap add android

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Make Gradle executable
        working-directory: frontend/android
        run: chmod +x gradlew

      - name: Build APK (debug, sin firma requerida)
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FoodGestor-Android
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
