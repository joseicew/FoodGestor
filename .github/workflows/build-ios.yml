name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'URL del backend (ej: http://100.x.x.x:5000)'
        required: true
        default: 'http://TU_IP_TAILSCALE:5000'

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Set API URL
        working-directory: frontend
        run: |
          sed -i '' "s|http://TU_IP_AQUI:5000|${{ github.event.inputs.api_url }}|g" src/environments/environment.prod.ts

      - name: Build Angular (production)
        working-directory: frontend
        run: npm run build -- --configuration=production

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync ios

      - name: Resolve Swift Package dependencies
        working-directory: frontend/ios/App
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme App

      - name: Build IPA (sin firmar)
        working-directory: frontend/ios/App
        run: |
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath $RUNNER_TEMP/FoodGestor.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE=""

      - name: Empaquetar IPA sin firmar (para AltStore)
        run: |
          APP_PATH=$(find $RUNNER_TEMP/FoodGestor.xcarchive/Products/Applications -maxdepth 1 -name "*.app" | head -n 1)
          echo "App encontrada en: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No se encontró el .app en el archive"
            exit 1
          fi
          mkdir -p $RUNNER_TEMP/ipa/Payload
          cp -R "$APP_PATH" $RUNNER_TEMP/ipa/Payload/
          cd $RUNNER_TEMP/ipa
          zip -r FoodGestor.ipa Payload > /dev/null
          rm -rf Payload
          echo "IPA generado:"
          ls -lh $RUNNER_TEMP/ipa/*.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: FoodGestor-iOS
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 7
